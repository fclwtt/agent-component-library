description: AI Agent组件库，包含从多个框架拆解出的标准化组件，支持多框架实现对比
frameworks:
- components_count: 44
  name: hermes
  path: frameworks/hermes/framework.yaml
interface_assignments:
  context-management: {provided_by: agent-engine, required_by: [llm-client, security]}
  llm-calling: {provided_by: llm-client, required_by: [agent-engine, entry-points, cli, tui]}
  memory-provider: {provided_by: memory-system, required_by: [tool-system, gateway, plugin-system, skill-system, entry-points, cli, tui]}
  platform-registry: {provided_by: plugin-system, required_by: [gateway]}
  provider-profile: {provided_by: llm-client, required_by: []}
  tool-registry: {provided_by: tool-system, required_by: [agent-engine, gateway, skill-system, acp-adapter, entry-points, cli, tui]}
interfaces:
  list:
  - name: context-management
    path: interfaces/context-management.yaml
  - name: llm-calling
    path: interfaces/llm-calling.yaml
  - name: memory-provider
    path: interfaces/memory-provider.yaml
  - name: platform-registry
    path: interfaces/platform-registry.yaml
  - name: provider-profile
    path: interfaces/provider-profile.yaml
  - name: tool-registry
    path: interfaces/tool-registry.yaml
  total: 6
name: Agent Component Library
structure:
  adapters: 适配层（用于混合架构改造）
  components: 按功能组织，每个功能下按框架分子目录
  frameworks: 框架组装方案（描述用哪些组件、怎么拼）
  interfaces: 通用接口协议定义
