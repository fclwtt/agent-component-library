name: hermes
full_name: Hermes Agent
description: Nous Research开发的AI Agent框架，支持多平台消息接入、工具调用、记忆管理
version: 2026-06
source: https://github.com/NousResearch/hermes-agent
license: MIT
architecture:
  style: layered
  layers:
  - name: cli
    description: CLI入口层
    components: []
  - name: gateway
    description: 消息网关层
    components:
    - gateway-core
    - session-management
    - gateway-config
    - message-delivery
    - gateway-hooks
  - name: core-engine
    description: 核心引擎层
    components:
    - agent-loop
    - prompt-engine
    - memory-core
    - tool-execution
    - context-management
    - error-handling
    - llm-client
    - llm-adapters
  - name: tools
    description: 工具层
    components:
    - terminal-tool
    - file-tool
    - browser-tool
    - mcp-tool
    - web-search-tool
    - vision-tool
    - tts-tool
    - image-gen-tool
    - video-gen-tool
    - delegate-tool
    - skill-tool
    - cronjob-tool
    - kanban-tool
    - approval-tool
    - clarify-tool
    - session-search-tool
    - computer-use-tool
    - transcription-tool
    - process-registry
    - checkpoint-manager
    - todo-tool
    - send-message-tool
    - x-search-tool
  - name: infrastructure
    description: 基础设施层
    components:
    - state-management
    - constants-config
    - logging-system
    - toolset-management
    - display-system
    - credential-management
    - security
  - name: environment
    description: 执行环境层
    components:
    - execution-environments
