name: PlatformRegistry
description: 平台注册表接口，管理消息平台的注册和适配
methods:
- name: register
  params:
    entry: PlatformEntry
  returns: None
  description: 注册平台
- name: unregister
  params:
    name: str
  returns: bool
  description: 注销平台
- name: get
  params:
    name: str
  returns: Optional[PlatformEntry]
  description: 获取平台条目
- name: all_entries
  returns: List[PlatformEntry]
  description: 获取所有平台
- name: create_adapter
  params:
    name: str
    config: Any
  returns: Optional[Any]
  description: 创建平台适配器
data_structures:
- name: PlatformEntry
  fields:
    name: str
    adapter_class: Type
    config_schema: Dict
    description: str
