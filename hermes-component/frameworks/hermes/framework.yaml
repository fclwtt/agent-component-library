data_flow:
  description: 用户消息 → 网关层 → 核心引擎层(Agent Loop) → 工具层 → 返回结果
  flow:
  - from: user
    to: gateway-core
    via: platform-adapter
  - from: gateway-core
    to: agent-loop
    via: session-management
  - from: agent-loop
    to: prompt-engine
    action: 构建Prompt
  - from: agent-loop
    to: llm-client
    action: 调用LLM
  - from: agent-loop
    to: tool-execution
    action: 执行工具
  - from: tool-execution
    to: tool-registry
    action: 查找工具
  - from: agent-loop
    to: memory-core
    action: 读写记忆
  - from: agent-loop
    to: context-management
    action: 压缩上下文
  - from: agent-loop
    to: gateway-core
    action: 返回结果
