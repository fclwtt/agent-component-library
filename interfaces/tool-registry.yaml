name: ToolRegistry
description: 工具注册表接口，管理工具的注册、发现和调用
methods:
- name: register
  params:
    name: str
    toolset: str
    schema: Dict
    handler: Callable
  returns: None
  description: 注册工具
- name: deregister
  params:
    name: str
  returns: None
  description: 注销工具
- name: get_entry
  params:
    name: str
  returns: Optional[ToolEntry]
  description: 获取工具条目
- name: get_definitions
  params:
    tool_names: Set[str]
  returns: List[dict]
  description: 获取工具定义
- name: dispatch
  params:
    name: str
    args: dict
  returns: str
  description: 调用工具
- name: get_all_tool_names
  returns: List[str]
  description: 获取所有工具名称
- name: is_toolset_available
  params:
    toolset: str
  returns: bool
  description: 检查工具集是否可用
- name: get_available_toolsets
  returns: Dict[str, dict]
  description: 获取可用工具集
data_structures:
- name: ToolEntry
  fields:
    name: str
    toolset: str
    schema: Dict
    handler: Callable
    check_fn: Optional[Callable]
    description: str
    emoji: str
